<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: url('background.jpg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signup-container {
      background-color: #f0fff8;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 350px;
      text-align: center;
    }

    h2 {
      color: #0b4f29;
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #0b4f29;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .google-btn {
      background-color: #eaf4ee;
      color: #333;
      border: 1px solid #ccc;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 15px;
      transition: background-color 0.3s;
    }

    .google-btn img {
      width: 18px;
      height: 18px;
    }

    .google-btn:hover {
      background-color: #d1e7dd;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 15px 0;
      color: #888;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background-color: #ccc;
      margin: 0 10px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      background-color: #f9f9f9;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #0b4f29;
    }

    .signup-btn {
      background-color: #4caf50;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      transition: background-color 0.3s;
    }

    .signup-btn:hover {
      background-color: #45a049;
    }

    .terms {
      font-size: 12px;
      color: #888;
      margin-top: 15px;
    }

    .terms a {
      color: #0b4f29;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="signup-container">
  <h2>Sign Up Now</h2>
  <p>Join the News Revolution!</p>

  <!-- Google Sign Up Button -->
  <div class="google-btn">
    <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google Logo" />
    Continue with Google
  </div>

  <!-- Divider -->
  <div class="divider">or</div>

  <!-- Email Input -->
  <input type="email" placeholder="Enter your email address" required />

  <!-- Password Input -->
  <input type="password" placeholder="Choose a password" required />
