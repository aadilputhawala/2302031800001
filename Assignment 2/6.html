<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewsTailor Footer</title>
  <style>
    /* General Styling */
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background-color: #eaf4ee;
      color: #0b4f29;
    }

    /* Footer Container */
    .footer {
      background-color: #eaf4ee;
      padding: 40px 20px;
      border-top: 1px solid #d3e0d7;
    }

    /* Trusted by Section */
    .trusted-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .trusted-section h2 {
      font-size: 18px;
      font-weight: 500;
      color: #4a6655;
      margin-bottom: 20px;
    }

    .logo-list {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      opacity: 0.5;
    }

    .logo-list img {
      height: 30px;
      filter: grayscale(100%);
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .logo-list img:hover {
      opacity: 1;
    }

    /* Footer Content */
    .footer-content {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding-top: 20px;
      border-top: 1px solid #d3e0d7;
    }

    .footer-section h3 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 10px;
      color: #4a6655;
    }

    .footer-section ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .footer-section ul li {
      margin-bottom: 8px;
    }

    .footer-section ul li a {
      color: #4a6655;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .footer-section ul li a:hover {
      color: #0b4f29;
    }

    /* Footer Bottom */
    .footer-bottom {
      display: flex;
      justify-content: space-between;
      padding-top: 20px;
      font-size: 14px;
      color: #4a6655;
      border-top: 1px solid #d3e0d7;
    }

    .footer-bottom a {
      color: #4a6655;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-bottom a:hover {
      color: #0b4f29;
    }

    /* Responsive Styling */
    @media (max-width: 768px) {
      .footer-content {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .footer-bottom {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

<!-- Footer Section -->
<footer class="footer">
  <!-- Trusted By Section -->
  <div class="trusted-section">
    <h2>Trusted by Leading News Consumers</h2>
    <div class="logo-list">
      <img src="framer.png" alt="Framer" />
      <img src="square.png" alt="Square" />
      <img src="webflow.png" alt="Webflow" />
      <img src="notion.png" alt="Notion" />
      <img src="medium.png" alt="Medium" />
      <img src="spotify.png" alt="Spotify" />
      <img src="dropbox.png" alt="Dropbox" />
      <img src="mailchimp.png" alt="Mailchimp" />
      <img src="slack.png" alt="Slack" />
      <img src="github.png" alt="GitHub" />
    </div>
  </div>

  <!-- Footer Content -->
  <div class="footer-content">
    <!-- Left Section -->
    <div class="footer-section">
      <h3>NewsTailor</h3>
      <p>Your Personalized News Source</p>
    </div>

    <!-- Company Section -->
    <div class="footer-section">
      <h3>Company</h3>
      <ul>
        <li><a href="#">About</a></li>
        <li><a href="#">Careers</a></li>
        <li><a href="#">Newsroom</a></li>
      </ul>
    </div>

    <!-- Features Section -->
    <div class="footer-section">
      <h3>Features</h3>
      <ul>
        <li><a href="#">Speed</a></li>
        <li><a href="#">Customization</a></li>
        <li><a href="#">Newsroom</a></li>
      </ul>
    </div>

    <!-- Social Section -->
    <div class="footer-section">
      <h3>Social</h3>
      <ul>
        <li><a href="#">Twitter</a></li>
        <li><a href="#">Instagram</a></li>
        <li><a href="#">Threads</a></li>
      </ul>
    </div>
  </div>

  <!-- Footer Bottom -->
  <div class="footer-bottom">
    <div>All rights reserved 2024</div>
    <div>
      <a href="#">Terms</a> &nbsp; | &nbsp;
      <a href="#">Privacy</a>
    </div>
  </div>
</footer>

</body>
</html>
